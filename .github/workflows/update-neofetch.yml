name: Update Profile Stats

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pillow

      - name: Generate stats cards (uses PAT for private contributions)
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
        run: python generate_stats_cards.py

      - name: Generate neofetch SVG
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
        run: python generate_neofetch.py

      - name: Refresh README stats section
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
        run: python update_readme_stats.py

      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dark_mode.svg light_mode.svg assets/ README.md
          git diff --staged --quiet || git commit -m "chore: auto-update profile stats and contributions"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git HEAD:main
