name: Update Profile Stats

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "dark_mode.svg"
      - "light_mode.svg"
      - "assets/**"
      - "README.md"

permissions:
  contents: write

concurrency:
  group: profile-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pillow

      - name: Generate stats.svg
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&hide_title=false&hide_rank=false&show_icons=true&include_all_commits=true&count_private=true&disable_animations=false&theme=dracula&locale=en&hide_border=false
          path: assets/stats.svg
          token: ${{ secrets.PAT || github.token }}

      - name: Generate languages.svg
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&locale=en&hide_title=false&layout=compact&card_width=320&langs_count=5&theme=dracula&hide_border=false
          path: assets/languages.svg
          token: ${{ secrets.PAT || github.token }}

      - name: Generate neofetch SVG
        env:
          GITHUB_TOKEN: ${{ secrets.PAT || github.token }}
        run: python generate_neofetch.py

      - name: Refresh README contribution graph
        env:
          GITHUB_TOKEN: ${{ secrets.PAT || github.token }}
        run: python update_readme_stats.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dark_mode.svg light_mode.svg assets/ README.md
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore: auto-update profile [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main
