name: Update Profile Stats

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "dark_mode.svg"
      - "light_mode.svg"
      - "assets/stats.svg"
      - "assets/languages.svg"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      # Always use GITHUB_TOKEN for git push (PAT is only for GitHub API)
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pillow

      - name: Generate neofetch SVG
        env:
          GITHUB_TOKEN: ${{ secrets.PAT || github.token }}
        run: python generate_neofetch.py

      - name: Refresh README contribution graph
        env:
          GITHUB_TOKEN: ${{ secrets.PAT || github.token }}
        run: python update_readme_stats.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dark_mode.svg light_mode.svg assets/ascii-art.txt README.md
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore: auto-update profile stats and contributions [skip ci]"
          git push origin HEAD:main
